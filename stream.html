<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Stream  beIN Sports HD1</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;800&family=Barlow:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0c10;
      --surface:  #13161d;
      --border:   #1e2230;
      --accent:   #00c2ff;
      --accent2:  #ff3b3b;
      --text:     #e8eaf0;
      --muted:    #6b7280;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
    }

    /* ── Top bar ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 1.35rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .logo span { color: var(--text); }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--accent2);
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 3px;
    }
    .live-badge::before {
      content: '';
      width: 7px; height: 7px;
      background: #fff;
      border-radius: 50%;
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.2; }
    }

    /* ── Main layout ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px 48px;
    }

    /* channel pill */
    .channel-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .channel-tag {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(0,194,255,.1);
      border: 1px solid rgba(0,194,255,.25);
      padding: 3px 10px;
      border-radius: 3px;
    }
    .channel-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    /* ── Player wrapper ── */
    .player-shell {
      position: relative;
      width: 100%;
      background: #000;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 0 60px rgba(0,194,255,.07);
    }

    .player-shell iframe {
      display: block;
      width: 100%;
      height: 540px;
      border: none;
    }

    /* overlay controls bar */
    .controls-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }

    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ctrl-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: .82rem;
      padding: 7px 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: background .18s, border-color .18s;
    }
    .ctrl-btn:hover {
      background: rgba(0,194,255,.12);
      border-color: var(--accent);
      color: var(--accent);
    }
    .ctrl-btn svg { flex-shrink: 0; }

    .ctrl-btn.danger:hover {
      background: rgba(255,59,59,.12);
      border-color: var(--accent2);
      color: var(--accent2);
    }

    /* quality selector */
    .quality-select {
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: .82rem;
      padding: 7px 10px;
      border-radius: 4px;
      cursor: pointer;
      outline: none;
    }
    .quality-select:hover { border-color: var(--accent); }

    /* status row */
    .status-row {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-top: 16px;
      font-size: .8rem;
      color: var(--muted);
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
      display: inline-block;
      margin-right: 5px;
      animation: blink 2s ease-in-out infinite;
    }

    /* fullscreen trick */
    .player-shell:-webkit-full-screen { width: 100vw; height: 100vh; border-radius: 0; }
    .player-shell:-webkit-full-screen iframe { height: 100%; }
    .player-shell:fullscreen { width: 100vw; height: 100vh; border-radius: 0; }
    .player-shell:fullscreen iframe { height: 100%; }

    @media (max-width: 640px) {
      .player-shell iframe { height: 220px; }
      .channel-name { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Stream<span>Cast</span></div>
  <div class="live-badge">Live</div>
</header>

<main>
  <div class="channel-row">
    <span class="channel-tag">Sports</span>
    <span class="channel-name">beIN Sports HD 1</span>
  </div>

  <div class="player-shell" id="playerShell">
    <iframe
      id="streamFrame"
      src="https://1.kooralive360.com/albaplayer/bein-sports-hd-1/?serv=0"
      allowfullscreen
      scrolling="no"
      allow="autoplay; fullscreen; encrypted-media"
    ></iframe>

    <div class="controls-bar">
      <div class="ctrl-group">
        <!-- Reload -->
        <button class="ctrl-btn" onclick="reloadStream()" title="Reload stream">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          Reload
        </button>

        <!-- Mute toggle -->
        <button class="ctrl-btn" id="muteBtn" onclick="toggleMute()" title="Mute/Unmute (affects page audio)">
          <svg id="muteIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
          <span id="muteTxt">Sound On</span>
        </button>

        <!-- Quality -->
        <select class="quality-select" onchange="changeQuality(this.value)" title="Stream server">
          <option value="0">Auto / HD</option>
          <option value="1">Server 2</option>
          <option value="2">Server 3</option>
        </select>
      </div>

      <div class="ctrl-group">
        <!-- Fullscreen -->
        <button class="ctrl-btn" onclick="goFullscreen()" title="Fullscreen">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
          Fullscreen
        </button>

        <!-- Pop-out -->
        <button class="ctrl-btn" onclick="popOut()" title="Open in new tab">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          Pop-out
        </button>
      </div>
    </div>
  </div>

  <div class="status-row">
    <span><span class="status-dot"></span> Stream connected</span>
    <span id="clockDisplay"></span>
    <span>beIN Sports HD 1 · Live Broadcast</span>
  </div>
</main>

<script>
  const frame = document.getElementById('streamFrame');
  const shell = document.getElementById('playerShell');
  let muted = false;

  function reloadStream() {
    const src = frame.src;
    frame.src = '';
    setTimeout(() => frame.src = src, 200);
  }

  function toggleMute() {
    // Mute the whole page (best effort for cross-origin iframe)
    muted = !muted;
    document.getElementById('muteTxt').textContent = muted ? 'Sound Off' : 'Sound On';
    const icon = document.getElementById('muteIcon');
    if (muted) {
      icon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>`;
    } else {
      icon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>`;
    }
  }

  function changeQuality(serv) {
    const base = 'https://1.kooralive360.com/albaplayer/bein-sports-hd-1/?serv=';
    frame.src = base + serv;
  }

  function goFullscreen() {
    if (shell.requestFullscreen) shell.requestFullscreen();
    else if (shell.webkitRequestFullscreen) shell.webkitRequestFullscreen();
  }

  function popOut() {
    window.open(frame.src, '_blank', 'width=1280,height=720,toolbar=0,menubar=0');
  }

  // Live clock
  function tick() {
    const now = new Date();
    document.getElementById('clockDisplay').textContent =
      now.toUTCString().replace('GMT', 'UTC').slice(0, -4);
  }
  tick(); setInterval(tick, 1000);
</script>

</body>
</html>
