<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Web Streaming - Sports</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #player-container {
            flex: 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000;
            padding: 20px;
        }
        video {
            width: 100%;
            max-width: 900px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            background: #1a1a1a;
        }
        #channel-info {
            margin-top: 20px;
            text-align: center;
        }
        #sidebar {
            flex: 1;
            background-color: #1e1e1e;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            min-width: 250px;
        }
        #sidebar-header {
            padding: 20px;
            background-color: #272727;
            font-size: 1.2rem;
            font-weight: bold;
        }
        #search-container {
            padding: 10px 15px;
            background-color: #272727;
            border-bottom: 1px solid #333;
        }
        #search-input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background-color: #121212;
            border: 1px solid #444;
            color: #ffffff;
            border-radius: 4px;
            font-family: inherit;
        }
        #search-input:focus {
            outline: none;
            border-color: #007bff;
        }
        #channel-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
        }
        .channel-item {
            padding: 15px 20px;
            border-bottom: 1px solid #2a2a2a;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .channel-item:hover {
            background-color: #333;
        }
        .channel-logo {
            width: 40px;
            height: 40px;
            object-fit: contain;
            background: #fff;
            border-radius: 4px;
            padding: 2px;
        }
        .loading, .no-results {
            padding: 20px;
            text-align: center;
            color: #888;
        }
        .no-results {
            font-style: italic;
        }
    </style>
</head>
<body>

    <div id="player-container">
        <video id="video" controls autoplay></video>
        <div id="channel-info">
            <h2 id="current-channel-name">Select a channel from the list</h2>
            <p id="status-msg" style="color: #aaa;"></p>
        </div>
    </div>

    <div id="sidebar">
        <div id="sidebar-header">Live Channels (Sports)</div>
        <div id="search-container">
            <input type="text" id="search-input" placeholder="Search channels...">
        </div>
        <ul id="channel-list">
            <div class="loading">Loading playlist...</div>
        </ul>
    </div>

    <script>
        const PLAYLIST_URL = 'https://iptv-org.github.io/iptv/categories/sports.m3u';
        
        // YOUR CUSTOM PROXY
        const PROXY_URL = 'https://sports-proxy.md-daf001.workers.dev/?';
        
        const video = document.getElementById('video');
        const channelList = document.getElementById('channel-list');
        const currentChannelName = document.getElementById('current-channel-name');
        const statusMsg = document.getElementById('status-msg');
        const searchInput = document.getElementById('search-input'); 
        let hls;
        let allChannels = []; 

        async function loadPlaylist() {
            try {
                const response = await fetch(PLAYLIST_URL);
                const text = await response.text();
                allChannels = parseM3U(text);
                renderChannelList(allChannels);
            } catch (error) {
                channelList.innerHTML = '<div class="loading">Error loading playlist.</div>';
                console.error('Error fetching playlist:', error);
            }
        }

        function parseM3U(m3uData) {
            const lines = m3uData.split('\n');
            const channels = [];
            let currentChannel = {};

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                if (line.startsWith('#EXTINF:')) {
                    const nameMatch = line.match(/,(.+)$/);
                    if (nameMatch) currentChannel.name = nameMatch[1];

                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    if (logoMatch) currentChannel.logo = logoMatch[1];
                } else if (line.startsWith('http')) {
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = {}; 
                }
            }
            return channels;
        }

        function renderChannelList(channels) {
            channelList.innerHTML = ''; 
            
            if (channels.length === 0) {
                channelList.innerHTML = '<div class="no-results">No channels found.</div>';
                return;
            }

            channels.forEach(channel => {
                const li = document.createElement('li');
                li.className = 'channel-item';
                
                const logoUrl = channel.logo || 'https://via.placeholder.com/40?text=TV';
                
                li.innerHTML = `
                    <img src="${logoUrl}" class="channel-logo" alt="${channel.name}" onerror="this.src='https://via.placeholder.com/40?text=TV'">
                    <span>${channel.name}</span>
                `;
                
                li.onclick = () => playStream(channel.url, channel.name);
                channelList.appendChild(li);
            });
        }

        searchInput.addEventListener('keyup', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredChannels = allChannels.filter(channel => 
                channel.name.toLowerCase().includes(searchTerm)
            );
            renderChannelList(filteredChannels);
        });

        function playStream(url, name) {
            currentChannelName.innerText = `Playing: ${name}`;
            statusMsg.innerText = "Loading stream securely...";

            if (Hls.isSupported()) {
                if (hls) {
                    hls.destroy(); 
                }
                
                hls = new Hls({
                    xhrSetup: function(xhr, requestUrl) {
                        xhr.open('GET', PROXY_URL + encodeURIComponent(requestUrl), true);
                    }
                });
                
                hls.loadSource(url); 
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    statusMsg.innerText = "Stream loaded.";
                    video.play().catch(e => console.log("Autoplay blocked"));
                });

                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        statusMsg.innerText = "Error: Stream offline or geo-blocked.";
                        statusMsg.style.color = "#ff4444";
                    }
                });
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = PROXY_URL + encodeURIComponent(url);
                video.addEventListener('loadedmetadata', function() {
                    statusMsg.innerText = "Stream loaded.";
                    video.play();
                });
            }
        }

        loadPlaylist();
    </script>
</body>
</html>
