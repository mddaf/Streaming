<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Web Streaming - Sports</title>
    <!-- Import HLS.js for playing m3u8 streams -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #player-container {
            flex: 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000;
            padding: 20px;
        }
        video {
            width: 100%;
            max-width: 900px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            background: #1a1a1a;
        }
        #channel-info {
            margin-top: 20px;
            text-align: center;
        }
        #sidebar {
            flex: 1;
            background-color: #1e1e1e;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
        }
        #sidebar-header {
            padding: 20px;
            background-color: #272727;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }
        #channel-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
        }
        .channel-item {
            padding: 15px 20px;
            border-bottom: 1px solid #2a2a2a;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .channel-item:hover {
            background-color: #333;
        }
        .channel-logo {
            width: 40px;
            height: 40px;
            object-fit: contain;
            background: #fff;
            border-radius: 4px;
            padding: 2px;
        }
        .loading {
            padding: 20px;
            text-align: center;
            color: #888;
        }
    </style>
</head>
<body>

    <div id="player-container">
        <video id="video" controls autoplay></video>
        <div id="channel-info">
            <h2 id="current-channel-name">Select a channel from the list</h2>
            <p id="status-msg" style="color: #aaa;"></p>
        </div>
    </div>

    <div id="sidebar">
        <div id="sidebar-header">Live Channels (Sports)</div>
        <ul id="channel-list">
            <div class="loading">Loading playlist...</div>
        </ul>
    </div>

    <script>
        // Updated to the Sports category from iptv-org
        const PLAYLIST_URL = 'https://iptv-org.github.io/iptv/categories/sports.m3u';
        
        const video = document.getElementById('video');
        const channelList = document.getElementById('channel-list');
        const currentChannelName = document.getElementById('current-channel-name');
        const statusMsg = document.getElementById('status-msg');
        let hls;

        // Fetch and parse the M3U playlist
        async function loadPlaylist() {
            try {
                const response = await fetch(PLAYLIST_URL);
                const text = await response.text();
                const channels = parseM3U(text);
                renderChannelList(channels);
            } catch (error) {
                channelList.innerHTML = '<div class="loading">Error loading playlist.</div>';
                console.error('Error fetching playlist:', error);
            }
        }

        // Basic M3U Parser
        function parseM3U(m3uData) {
            const lines = m3uData.split('\n');
            const channels = [];
            let currentChannel = {};

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                if (line.startsWith('#EXTINF:')) {
                    // Extract channel name (after the last comma)
                    const nameMatch = line.match(/,(.+)$/);
                    if (nameMatch) currentChannel.name = nameMatch[1];

                    // Extract logo URL if available
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    if (logoMatch) currentChannel.logo = logoMatch[1];
                } else if (line.startsWith('http')) {
                    // It's a stream URL
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = {}; // Reset for the next channel
                }
            }
            return channels;
        }

        // Render channels in the sidebar
        function renderChannelList(channels) {
            channelList.innerHTML = ''; // Clear loading text
            
            channels.forEach(channel => {
                const li = document.createElement('li');
                li.className = 'channel-item';
                
                // Set fallback logo if none exists
                const logoUrl = channel.logo || 'https://via.placeholder.com/40?text=TV';
                
                li.innerHTML = `
                    <img src="${logoUrl}" class="channel-logo" alt="${channel.name}" onerror="this.src='https://via.placeholder.com/40?text=TV'">
                    <span>${channel.name}</span>
                `;
                
                li.onclick = () => playStream(channel.url, channel.name);
                channelList.appendChild(li);
            });
        }

        // Play the selected stream using HLS.js
        function playStream(url, name) {
            currentChannelName.innerText = `Playing: ${name}`;
            statusMsg.innerText = "Loading stream...";

            if (Hls.isSupported()) {
                if (hls) {
                    hls.destroy(); // Destroy previous instance
                }
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    statusMsg.innerText = "Stream loaded.";
                    video.play().catch(e => console.log("Autoplay blocked"));
                });

                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        statusMsg.innerText = "Error: Stream offline or blocked by CORS.";
                        statusMsg.style.color = "#ff4444";
                    }
                });
            } 
            // Native support (Safari / iOS)
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    statusMsg.innerText = "Stream loaded.";
                    video.play();
                });
            }
        }

        // Initialize the app
        loadPlaylist();
    </script>
</body>
</html>
