<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Stream · beIN Sports HD1</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;800&family=Barlow:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0c10;
      --surface: #13161d;
      --border:  #1e2230;
      --accent:  #00c2ff;
      --red:     #ff3b3b;
      --text:    #e8eaf0;
      --muted:   #6b7280;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      overflow-x: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 10;
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .logo span { color: var(--text); }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--red);
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .13em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 3px;
    }
    .live-badge::before {
      content: '';
      width: 7px; height: 7px;
      background: #fff;
      border-radius: 50%;
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }

    .channel-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .channel-tag {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .76rem;
      font-weight: 600;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(0,194,255,.1);
      border: 1px solid rgba(0,194,255,.25);
      padding: 3px 10px;
      border-radius: 3px;
    }
    .channel-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    /* ── Player shell ── */
    .player-shell {
      position: relative;
      width: 100%;
      background: #000;
      border-radius: 6px;
      border: 1px solid var(--border);
      box-shadow: 0 0 60px rgba(0,194,255,.07);
      overflow: hidden;
    }

    /* Responsive 16:9 ratio container */
    .ratio-box {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 */
      background: #000;
    }

    .ratio-box iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Loading overlay */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 5;
      transition: opacity .4s;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 42px; height: 42px;
      border: 3px solid rgba(0,194,255,.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-overlay p {
      font-size: .85rem;
      color: var(--muted);
      letter-spacing: .05em;
    }

    /* ── Controls bar ── */
    .controls-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      padding: 11px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .ctrl-group { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }

    .ctrl-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: .8rem;
      padding: 6px 13px;
      border-radius: 4px;
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
      white-space: nowrap;
      user-select: none;
    }
    .ctrl-btn:hover {
      background: rgba(0,194,255,.13);
      border-color: var(--accent);
      color: var(--accent);
    }
    .ctrl-btn.active {
      background: rgba(0,194,255,.18);
      border-color: var(--accent);
      color: var(--accent);
    }

    .ctrl-btn.fs-btn:hover {
      background: rgba(255,255,255,.1);
      border-color: #aaa;
      color: #fff;
    }

    select.quality-select {
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: .8rem;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      outline: none;
    }
    select.quality-select:hover { border-color: var(--accent); }
    select.quality-select option { background: var(--surface); }

    /* Status row */
    .status-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 14px;
      font-size: .78rem;
      color: var(--muted);
      flex-wrap: wrap;
    }
    .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 5px #22c55e;
      margin-right: 5px;
      animation: blink 2s ease-in-out infinite;
    }

    /* ── TRUE fullscreen overrides ── */
    /* When the iframe itself is fullscreen */
    iframe:fullscreen,
    iframe:-webkit-full-screen {
      width: 100vw !important;
      height: 100vh !important;
    }

    @media (max-width: 600px) {
      .channel-name { font-size: 1.1rem; }
      .ctrl-btn span { display: none; } /* icon only on mobile */
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Stream<span>Cast</span></div>
  <div class="live-badge">Live</div>
</header>

<main>
  <div class="channel-row">
    <span class="channel-tag">Sports</span>
    <span class="channel-name">beIN Sports HD 1</span>
  </div>

  <div class="player-shell">
    <div class="ratio-box" id="ratioBox">

      <!-- Loading spinner shown until iframe signals load -->
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>Connecting to stream…</p>
      </div>

      <iframe
        id="streamFrame"
        src="https://1.kooralive360.com/albaplayer/bein-sports-hd-1/?serv=0"
        allowfullscreen="true"
        allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
        scrolling="no"
        referrerpolicy="no-referrer"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation allow-pointer-lock"
      ></iframe>
    </div>

    <div class="controls-bar">
      <div class="ctrl-group">

        <button class="ctrl-btn" id="reloadBtn" onclick="reloadStream()" title="Reload stream">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          <span>Reload</span>
        </button>

        <select class="quality-select" onchange="switchServer(this.value)" title="Switch stream server">
          <option value="0">Server 1 (HD)</option>
          <option value="1">Server 2</option>
          <option value="2">Server 3</option>
        </select>

      </div>

      <div class="ctrl-group">

        <button class="ctrl-btn" onclick="openInTab()" title="Open in new tab">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          <span>New Tab</span>
        </button>

        <button class="ctrl-btn fs-btn" onclick="goFullscreen()" title="True Fullscreen">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 3 21 3 21 9"/>
            <polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/>
            <line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
          <span>Fullscreen</span>
        </button>

      </div>
    </div>
  </div>

  <div class="status-row">
    <span><span class="dot"></span>Stream active</span>
    <span id="clockEl"></span>
    <span>beIN Sports HD 1 · Live</span>
    <span style="margin-left:auto; color: #4b5563; font-size:.74rem;">If stream is blank, try Reload or switch Server</span>
  </div>
</main>

<script>
  const frame   = document.getElementById('streamFrame');
  const overlay = document.getElementById('loadingOverlay');
  const BASE    = 'https://1.kooralive360.com/albaplayer/bein-sports-hd-1/?serv=';
  let   currentServ = 0;

  // Hide loader once iframe fires load event
  frame.addEventListener('load', () => {
    setTimeout(() => overlay.classList.add('hidden'), 800);
  });
  // Fallback: hide after 6 s no matter what
  setTimeout(() => overlay.classList.add('hidden'), 6000);

  function reloadStream() {
    overlay.classList.remove('hidden');
    const src = frame.src;
    frame.src = 'about:blank';
    setTimeout(() => { frame.src = src; }, 300);
    setTimeout(() => overlay.classList.add('hidden'), 6000);
  }

  function switchServer(val) {
    currentServ = parseInt(val);
    overlay.classList.remove('hidden');
    frame.src = BASE + currentServ;
    setTimeout(() => overlay.classList.add('hidden'), 6000);
  }

  function openInTab() {
    window.open(frame.src, '_blank');
  }

  // TRUE fullscreen — request directly on the <iframe> element
  // so the browser puts the iframe content full-screen, not just our div.
  function goFullscreen() {
    const el = frame; // fullscreen the iframe itself
    if (el.requestFullscreen)            el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.mozRequestFullScreen)    el.mozRequestFullScreen();
    else if (el.msRequestFullscreen)     el.msRequestFullscreen();
  }

  // ESC already exits; also handle F key shortcut
  document.addEventListener('keydown', e => {
    if (e.key === 'f' || e.key === 'F') goFullscreen();
    if (e.key === 'r' || e.key === 'R') reloadStream();
  });

  // Live clock
  function tick() {
    const n = new Date();
    document.getElementById('clockEl').textContent =
      n.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'}) + ' UTC';
  }
  tick(); setInterval(tick, 1000);
</script>

</body>
</html>
